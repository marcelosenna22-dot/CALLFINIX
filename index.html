<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Zap PRO Fullscreen</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root {
            --green: #00a884;
            --bg: #0b141a;
            --panel: #202c33;
            --text: #e9edef;
        }

        body {
            margin: 0;
            /* 100dvh garante tela cheia real no mobile */
            height: 100dvh;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            overflow: hidden;
            position: fixed; /* Evita scrolls indesejados no iOS */
            width: 100%;
        }

        /* SIDEBAR (MENU LATERAL) */
        #sidebar {
            width: 300px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        .header { padding: 20px; background: #2a3942; text-align: center; border-bottom: 1px solid #3b4a54; }

        #contatos { flex: 1; overflow-y: auto; padding: 10px; }
        .contact {
            padding: 15px;
            margin-bottom: 8px;
            background: #111b21;
            border-radius: 12px;
            cursor: pointer;
            border-left: 4px solid var(--green);
        }

        .add-container { padding: 15px; border-bottom: 1px solid #3b4a54; }
        .add-header { background: var(--green); padding: 12px; border-radius: 30px; cursor: pointer; text-align: center; font-weight: bold; }
        .add-box { margin-top: 10px; display: none; flex-direction: column; gap: 8px; }

        /* MAIN (VÍDEO EM TELA CHEIA) */
        #main {
            flex: 1;
            position: relative;
            background: black;
            display: flex;
            height: 100dvh;
        }

        #remoto { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Garante tela cheia sem bordas pretas */
        }

        #local {
            position: absolute;
            width: 100px;
            height: 150px;
            top: env(safe-area-inset-top, 20px); /* Ajuste para o 'notch' do iPhone */
            right: 20px;
            border: 2px solid var(--green);
            border-radius: 12px;
            object-fit: cover;
            z-index: 10;
            background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* CONTROLES ESTILO WHATSAPP */
        .controls {
            position: absolute;
            bottom: calc(30px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .btn-round {
            width: 55px; height: 55px; border-radius: 50%;
            border: none; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 22px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .green { background: var(--green); color: white; }
        .red { background: #ea0038; color: white; }
        .gray { background: rgba(84, 101, 111, 0.8); backdrop-filter: blur(5px); color: white; }

        #btn-menu {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            z-index: 50;
            width: 45px; height: 45px;
            font-size: 18px;
        }

        /* LOGIN */
        #login {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 200;
        }
        .box { background: var(--panel); padding: 30px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center;}
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; background: #2a3942; color: white; box-sizing: border-box; }

        /* MOBILE ADJUSTS */
        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                left: 0; top: 0; bottom: 0;
                transform: translateX(-100%);
                width: 85%; /* Menu ocupa quase toda a tela no celular */
            }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="login">
    <div class="box">
        <h2 style="color: var(--green); margin-bottom: 20px;">Zap PRO</h2>
        <input id="userId" placeholder="Seu nome">
        <button class="green" style="width: 100%; padding: 15px; border-radius: 30px; border:none; font-weight: bold;" onclick="login()">ENTRAR</button>
    </div>
</div>

<button id="btn-menu" class="btn-round gray" onclick="toggleSidebar()">👥</button>

<div id="sidebar">
    <div class="header">
        <b>Meu ID:</b> <span id="meuId" style="color:var(--green)"></span>
    </div>

    <div class="add-container">
        <div class="add-header" onclick="toggleAdd()">➕ Adicionar Contato</div>
        <div class="add-box" id="addBox">
            <input id="nome" placeholder="Nome">
            <input id="id" placeholder="ID">
            <button class="green" style="border-radius: 10px; border:none; padding: 12px;" onclick="add()">Salvar</button>
        </div>
    </div>

    <div id="contatos"></div>
    
    <button class="gray" style="margin: 20px; border-radius: 30px; padding: 12px; border:none;" onclick="toggleSidebar()">Fechar Agenda</button>
</div>

<div id="main">
    <video id="remoto" autoplay playsinline></video>
    <video id="local" autoplay muted playsinline></video>

    <div class="controls">
        <button class="btn-round gray" onclick="trocar()">🔄</button>
        <button class="btn-round red" onclick="desligar()">❌</button>
    </div>
</div>

<script>
let peer, stream, callAtual;
let camera = "user";

function login() {
    const id = document.getElementById("userId").value.trim();
    if (!id) return alert("Digite um nome!");
    localStorage.setItem("user", id);
    iniciarPeer(id);
}

function iniciarPeer(id) {
    peer = new Peer(id);
    peer.on("open", async (id) => {
        document.getElementById("meuId").innerText = id;
        document.getElementById("login").style.display = "none";
        await startCamera();
    });

    peer.on("call", call => {
        call.answer(stream);
        callAtual = call;
        call.on("stream", s => { document.getElementById("remoto").srcObject = s; });
    });
}

window.onload = () => {
    const user = localStorage.getItem("user");
    if (user) iniciarPeer(user);
    listar();
};

async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: camera, width: {ideal: 1280}, height: {ideal: 720} },
            audio: true
        });
        document.getElementById("local").srcObject = stream;
        document.getElementById("local").style.transform = (camera === "user") ? "scaleX(-1)" : "scaleX(1)";
    } catch { alert("Erro ao abrir câmera"); }
}

async function trocar() {
    camera = (camera === "user") ? "environment" : "user";
    await startCamera();
}

function ligar(id) {
    const call = peer.call(id, stream);
    callAtual = call;
    call.on("stream", s => { document.getElementById("remoto").srcObject = s; });
    if(window.innerWidth < 768) toggleSidebar();
}

function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); }
function toggleAdd() { 
    const box = document.getElementById("addBox");
    box.style.display = (box.style.display === "flex") ? "none" : "flex";
}

function add() {
    const n = document.getElementById("nome").value;
    const i = document.getElementById("id").value;
    if (!n || !i) return;
    let l = JSON.parse(localStorage.getItem("cont") || "[]");
    l.push({ nome: n, id: i });
    localStorage.setItem("cont", JSON.stringify(l));
    listar();
    toggleAdd();
}

function listar() {
    const l = JSON.parse(localStorage.getItem("cont") || "[]");
    document.getElementById("contatos").innerHTML = l.map(c => `
        <div class="contact" onclick="ligar('${c.id}')">
            <b>${c.nome}</b><br><small>ID: ${c.id}</small>
        </div>
    `).join("");
}

function desligar() {
    if (callAtual) callAtual.close();
    document.getElementById("remoto").srcObject = null;
}
</script>
</body>
</html>
