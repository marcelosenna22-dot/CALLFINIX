<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zap PRO Chat & Video</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --green: #00a884;
            --bg: #0b141a;
            --panel: #202c33;
            --incoming: #202c33;
            --text: #e9edef;
            --chat-bg: #0b141a;
        }

        body {
            margin: 0;
            height: 100dvh;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            overflow: hidden;
        }

        /* --- LOGIN --- */
        #login {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 500;
        }
        .box { background: var(--panel); padding: 30px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center;}
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; background: #2a3942; color: white; box-sizing: border-box; }

        /* --- SIDEBAR (LISTA) --- */
        #sidebar {
            width: 350px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .header { padding: 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; }
        
        .contact {
            padding: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .contact:hover { background: var(--panel); }
        .avatar { width: 45px; height: 45px; background: #54656f; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px;}

        /* --- CHAT AREA --- */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            position: relative;
        }
        #chat-header {
            padding: 10px 20px;
            background: var(--panel);
            display: none; /* Só aparece quando clica no contato */
            align-items: center;
            justify-content: space-between;
        }
        .chat-actions { display: flex; gap: 20px; font-size: 20px; }
        .chat-actions span { cursor: pointer; color: var(--green); }
        
        #chat-empty {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: #8696a0; text-align: center;
        }

        /* --- VIDEO CALL (FULLSCREEN) --- */
        #video-screen {
            position: fixed; inset: 0; background: black;
            display: none; z-index: 400;
        }
        #remoto { width: 100%; height: 100%; object-fit: cover; }
        #local {
            position: absolute; width: 100px; height: 150px;
            top: 40px; right: 20px; border: 2px solid var(--green);
            border-radius: 12px; object-fit: cover; z-index: 410;
        }
        .call-controls {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 20px;
        }

        /* BOTÕES */
        .btn-round {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white;
        }
        .btn-green { background: var(--green); }
        .btn-red { background: #ea0038; }
        .btn-gray { background: #54656f; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-container { 
                position: fixed; inset: 0; transform: translateX(100%); 
                transition: 0.3s; z-index: 200; 
            }
            #chat-container.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="login">
    <div class="box">
        <h2 style="color: var(--green);">Zap PRO</h2>
        <input id="userId" placeholder="Seu Nome">
        <button class="btn-green" style="width:100%; padding:15px; border-radius:30px; font-weight:bold;" onclick="login()">ENTRAR</button>
    </div>
</div>

<div id="sidebar">
    <div class="header">
        <b>Conversas</b>
        <span id="meuId" style="font-size: 12px; color: var(--green)"></span>
    </div>
    
    <div style="padding: 15px;">
        <button class="btn-green" style="width:100%; border-radius:10px; padding:10px;" onclick="document.getElementById('add-pop').style.display='block'">+ Novo Contato</button>
    </div>

    <div id="add-pop" style="display:none; padding:15px; background:var(--panel)">
        <input id="new-name" placeholder="Nome">
        <input id="new-id" placeholder="ID do amigo">
        <button class="btn-green" style="width:100%" onclick="addContact()">Salvar</button>
    </div>

    <div id="contatos"></div>
</div>

<div id="chat-container">
    <div id="chat-header">
        <div style="display:flex; align-items:center;">
            <span onclick="closeChat()" style="margin-right:15px; cursor:pointer" class="mobile-only">⬅</span>
            <div class="avatar">👤</div>
            <b id="chat-user-name">Nome</b>
        </div>
        <div class="chat-actions">
            <span onclick="startCall(true)">📹</span>
            <span onclick="startCall(false)">📞</span>
        </div>
    </div>

    <div id="chat-empty">
        <p>Selecione um contato para conversar</p>
    </div>
</div>

<div id="video-screen">
    <video id="remoto" autoplay playsinline></video>
    <video id="local" autoplay muted playsinline></video>
    <div class="call-controls">
        <button class="btn-round btn-gray" onclick="trocarCamera()">🔄</button>
        <button class="btn-round btn-red" onclick="hangUp()">❌</button>
    </div>
</div>

<script>
let peer, stream, callAtual, selectedContactId = null;
let cameraMode = "user";

function login() {
    const id = document.getElementById("userId").value.trim();
    if (!id) return;
    localStorage.setItem("user", id);
    iniciarPeer(id);
}

function iniciarPeer(id) {
    peer = new Peer(id);
    peer.on("open", async (myId) => {
        document.getElementById("meuId").innerText = "Meu ID: " + myId;
        document.getElementById("login").style.display = "none";
        await initMedia();
    });

    peer.on("call", call => {
        if(confirm("Recebendo chamada de " + call.peer + ". Aceitar?")) {
            call.answer(stream);
            setupCall(call);
        }
    });
}

async function initMedia() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        document.getElementById("local").srcObject = stream;
    } catch (e) { console.log("Erro mídia:", e); }
}

function openChat(name, id) {
    selectedContactId = id;
    document.getElementById("chat-user-name").innerText = name;
    document.getElementById("chat-header").style.display = "flex";
    document.getElementById("chat-empty").style.display = "none";
    document.getElementById("chat-container").classList.add("active");
}

function closeChat() {
    document.getElementById("chat-container").classList.remove("active");
}

function startCall(withVideo) {
    if (!selectedContactId) return;
    document.getElementById("video-screen").style.display = "block";
    
    // Se for só áudio, escondemos o vídeo local por capricho
    document.getElementById("local").style.display = withVideo ? "block" : "none";

    const call = peer.call(selectedContactId, stream);
    setupCall(call);
}

function setupCall(call) {
    callAtual = call;
    document.getElementById("video-screen").style.display = "block";
    call.on("stream", s => {
        document.getElementById("remoto").srcObject = s;
    });
}

function hangUp() {
    if (callAtual) callAtual.close();
    document.getElementById("video-screen").style.display = "none";
    document.getElementById("remoto").srcObject = null;
}

async function trocarCamera() {
    cameraMode = (cameraMode === "user") ? "environment" : "user";
    stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: cameraMode }, audio: true
    });
    document.getElementById("local").srcObject = stream;
    // Opcional: Re-enviar stream para a call atual se necessário
}

function addContact() {
    const name = document.getElementById("new-name").value;
    const id = document.getElementById("new-id").value;
    if(!name || !id) return;
    let list = JSON.parse(localStorage.getItem("zap_cont") || "[]");
    list.push({name, id});
    localStorage.setItem("zap_cont", JSON.stringify(list));
    renderContacts();
    document.getElementById("add-pop").style.display = "none";
}

function renderContacts() {
    const list = JSON.parse(localStorage.getItem("zap_cont") || "[]");
    document.getElementById("contatos").innerHTML = list.map(c => `
        <div class="contact" onclick="openChat('${c.name}', '${c.id}')">
            <div class="avatar">👤</div>
            <div><b>${c.name}</b><br><small>ID: ${c.id}</small></div>
        </div>
    `).join("");
}

window.onload = () => {
    const u = localStorage.getItem("user");
    if(u) iniciarPeer(u);
    renderContacts();
};
</script>
</body>
</html>
