<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zap PRO - Miniatura Mode</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --green: #00a884;
            --bg: #0b141a;
            --panel: #202c33;
            --text: #e9edef;
        }

        body {
            margin: 0;
            height: 100dvh;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
        }

        /* --- NAVEGAÇÃO LATERAL --- */
        #sidebar {
            width: 350px;
            background: var(--bg);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* --- ÁREA DE CHAT --- */
        #chat-main {
            flex: 1;
            background: #0b141a;
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        .chat-header {
            padding: 10px 15px;
            background: var(--panel);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* --- CONTAINER DE CHAMADA (O SEGREDO) --- */
        #call-container {
            position: fixed;
            background: #000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            display: none; /* Só aparece na chamada */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Estado: Tela Cheia */
        #call-container.fullscreen {
            inset: 0;
            width: 100vw;
            height: 100dvh;
            border-radius: 0;
        }

        /* Estado: Miniatura (Picture in Picture) */
        #call-container.mini {
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 180px;
            border-radius: 15px;
            border: 2px solid var(--green);
            cursor: pointer;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        
        #local-video {
            position: absolute;
            width: 30%;
            max-width: 100px;
            aspect-ratio: 2/3;
            top: 10px;
            right: 10px;
            border-radius: 8px;
            border: 1px solid white;
            z-index: 1001;
        }

        /* Esconder vídeo local na miniatura para focar no remoto */
        #call-container.mini #local-video { display: none; }

        .call-actions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            transition: opacity 0.3s;
        }

        #call-container.mini .call-actions { opacity: 0; pointer-events: none; }

        .btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            color: white; font-size: 20px; cursor: pointer;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; inset: 0; }
            #chat-main { position: absolute; inset: 0; transform: translateX(100%); transition: 0.3s; }
            #chat-main.active { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align:center; background: var(--panel); padding: 30px; border-radius: 20px;">
            <h2 style="color: var(--green)">Zap PRO</h2>
            <input id="my-id-input" placeholder="Seu Nome" style="padding: 10px; border-radius: 5px; border:none; width: 80%;">
            <button onclick="doLogin()" style="background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px;">Entrar</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding: 20px; background: var(--panel);"><b>Conversas</b></div>
        <div style="padding: 10px;">
            <button onclick="document.getElementById('add-contact-ui').style.display='block'" style="width:100%; background: var(--green); border:none; color:white; padding:10px; border-radius:5px;">+ Novo Contato</button>
            <div id="add-contact-ui" style="display:none; margin-top:10px;">
                <input id="contact-name" placeholder="Nome">
                <input id="contact-id" placeholder="ID">
                <button onclick="saveContact()" style="width:100%">Salvar</button>
            </div>
        </div>
        <div id="contact-list" style="overflow-y: auto;"></div>
    </div>

    <div id="chat-main">
        <div id="chat-header-ui" class="chat-header" style="display:none;">
            <div style="display:flex; align-items:center; gap:10px;">
                <span onclick="goBack()" style="cursor:pointer">⬅</span>
                <b id="target-name-ui">Nome</b>
            </div>
            <div style="display:flex; gap:15px; font-size: 20px;">
                <span onclick="makeCall(true)" style="cursor:pointer">📹</span>
                <span onclick="makeCall(false)" style="cursor:pointer">📞</span>
            </div>
        </div>
        <div id="empty-chat" style="flex:1; display:flex; align-items:center; justify-content:center; color:#8696a0;">
            Selecione um contato
        </div>
    </div>

    <div id="call-container" class="fullscreen" onclick="expandVideo()">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        
        <div class="call-actions">
            <button class="btn" style="background: #54656f;" onclick="event.stopPropagation(); switchCam()">🔄</button>
            <button class="btn" style="background: #ea0038;" onclick="event.stopPropagation(); endCall()">❌</button>
        </div>
    </div>

    <script>
        let peer, myStream, activeCall, targetId;

        function doLogin() {
            const id = document.getElementById("my-id-input").value;
            if(!id) return;
            peer = new Peer(id);
            peer.on('open', async () => {
                document.getElementById("login-screen").style.display = "none";
                myStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById("local-video").srcObject = myStream;
            });
            peer.on('call', call => {
                if(confirm("Aceitar chamada?")) {
                    call.answer(myStream);
                    handleCall(call);
                }
            });
        }

        function saveContact() {
            const n = document.getElementById("contact-name").value;
            const i = document.getElementById("contact-id").value;
            let list = JSON.parse(localStorage.getItem("contacts_v3") || "[]");
            list.push({n, i});
            localStorage.setItem("contacts_v3", JSON.stringify(list));
            renderContacts();
        }

        function renderContacts() {
            const list = JSON.parse(localStorage.getItem("contacts_v3") || "[]");
            document.getElementById("contact-list").innerHTML = list.map(c => `
                <div style="padding:15px; border-bottom:1px solid #2a3942; cursor:pointer" onclick="openChat('${c.n}', '${c.i}')">
                    <b>${c.n}</b><br><small>${c.i}</small>
                </div>
            `).join("");
        }

        function openChat(name, id) {
            targetId = id;
            document.getElementById("target-name-ui").innerText = name;
            document.getElementById("chat-header-ui").style.display = "flex";
            document.getElementById("empty-chat").style.display = "none";
            document.getElementById("chat-main").classList.add("active");
        }

        function goBack() {
            document.getElementById("chat-main").classList.remove("active");
            // Se houver chamada, ela vira miniatura
            if(activeCall) {
                document.getElementById("call-container").className = "mini";
            }
        }

        function makeCall(video) {
            const call = peer.call(targetId, myStream);
            handleCall(call);
        }

        function handleCall(call) {
            activeCall = call;
            const container = document.getElementById("call-container");
            container.style.display = "block";
            container.className = "fullscreen";
            
            call.on('stream', s => {
                document.getElementById("remote-video").srcObject = s;
            });
        }

        function expandVideo() {
            const container = document.getElementById("call-container");
            if(container.className === "mini") {
                container.className = "fullscreen";
            }
        }

        function endCall() {
            if(activeCall) activeCall.close();
            document.getElementById("call-container").style.display = "none";
            activeCall = null;
        }

        window.onload = renderContacts;
    </script>
</body>
</html>
