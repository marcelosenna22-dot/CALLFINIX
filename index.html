<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zap PRO</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
:root {
    --green: #00a884;
    --bg: #0b141a;
    --panel: #202c33;
    --text: #e9edef;
}

body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    display: flex;
}

/* SIDEBAR */
#sidebar {
    width: 320px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.1);
}

/* HEADER */
.header {
    padding: 15px;
    background: #2a3942;
    text-align: center;
    font-weight: bold;
}

/* CONTATOS */
.contact {
    padding: 12px;
    margin: 5px;
    background: #111b21;
    border-radius: 8px;
    cursor: pointer;
}
.contact:hover {
    background: #2a3942;
}

/* MAIN */
#main {
    flex: 1;
    position: relative;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* VIDEO REMOTO */
#remoto {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* VIDEO LOCAL (miniatura) */
#local {
    position: absolute;
    width: 160px;
    height: 220px;
    bottom: 20px;
    right: 20px;
    border: 2px solid var(--green);
    border-radius: 12px;
    object-fit: cover;
    z-index: 10;
}

/* CONTROLES */
.controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}

/* BOTÕES */
button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.green {
    background: var(--green);
    color: white;
}

.red {
    background: red;
    color: white;
}

/* LOGIN */
#login {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.box {
    background: var(--panel);
    padding: 30px;
    border-radius: 10px;
}

/* MOBILE */
@media (max-width: 768px) {

    body {
        flex-direction: column;
    }

    #sidebar {
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: 2;
    }

    #main {
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: 1;
        display: none;
    }

    #main.active {
        display: block;
    }

    .back-btn {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        background: rgba(0,0,0,0.5);
        color: white;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h2>Entrar</h2>
        <input id="userId" placeholder="Seu ID"><br><br>
        <button class="green" onclick="login()">Entrar</button>
    </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
    <div class="header">
        ID: <span id="meuId"></span>
    </div>

    <div style="padding:10px;">
        <input id="nome" placeholder="Nome"><br>
        <input id="id" placeholder="ID"><br>
        <button class="green" onclick="add()">Adicionar</button>
    </div>

    <div id="contatos"></div>
</div>

<!-- MAIN -->
<div id="main">
    <div class="back-btn" onclick="voltar()">⬅ Voltar</div>

    <video id="remoto" autoplay playsinline></video>
    <video id="local" autoplay muted playsinline></video>

    <div class="controls">
        <button class="green" onclick="trocar()">🔄</button>
        <button class="red" onclick="desligar()">❌</button>
    </div>
</div>

<script>
let peer, stream, callAtual;
let camera = "user";

/* LOGIN */
function login() {
    const id = document.getElementById("userId").value.trim();
    if (!id) return alert("Digite ID");

    localStorage.setItem("user", id);
    iniciarPeer(id);
}

function iniciarPeer(id) {
    peer = new Peer(id);

    peer.on("open", async (id) => {
        document.getElementById("meuId").innerText = id;
        document.getElementById("login").style.display = "none";

        await startCamera();
    });

    peer.on("call", call => {
        call.answer(stream);
        callAtual = call;

        call.on("stream", s => {
            document.getElementById("remoto").srcObject = s;
        });

        abrirTelaMobile();
    });

    peer.on("error", err => alert("Erro: " + err));
}

/* AUTO LOGIN */
window.onload = () => {
    const user = localStorage.getItem("user");
    if (user) iniciarPeer(user);

    listar();
};

/* CAMERA */
async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());

    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: camera },
            audio: true
        });

        document.getElementById("local").srcObject = stream;

    } catch {
        alert("Erro ao acessar câmera");
    }
}

/* TROCAR CAMERA */
async function trocar() {
    camera = camera === "user" ? "environment" : "user";
    await startCamera();
}

/* LIGAR */
function ligar(id) {
    if (!stream) return alert("Sem câmera");

    const call = peer.call(id, stream);
    callAtual = call;

    call.on("stream", s => {
        document.getElementById("remoto").srcObject = s;
    });

    abrirTelaMobile();
}

/* MOBILE VIEW */
function abrirTelaMobile() {
    if (window.innerWidth < 768) {
        document.getElementById("main").classList.add("active");
        document.getElementById("sidebar").style.display = "none";
    }
}

function voltar() {
    document.getElementById("main").classList.remove("active");
    document.getElementById("sidebar").style.display = "flex";
}

/* DESLIGAR */
function desligar() {
    if (callAtual) {
        callAtual.close();
        document.getElementById("remoto").srcObject = null;
    }
}

/* CONTATOS */
function add() {
    const nome = document.getElementById("nome").value;
    const id = document.getElementById("id").value;

    if (!nome || !id) return;

    let lista = JSON.parse(localStorage.getItem("cont") || "[]");

    if (lista.find(c => c.id === id)) {
        alert("Contato já existe");
        return;
    }

    lista.push({ nome, id });
    localStorage.setItem("cont", JSON.stringify(lista));

    listar();
}

/* LISTAR */
function listar() {
    const lista = JSON.parse(localStorage.getItem("cont") || "[]");

    document.getElementById("contatos").innerHTML =
        lista.map(c => `
            <div class="contact" onclick="ligar('${c.id}')">
                ${c.nome}<br><small>${c.id}</small>
            </div>
        `).join("");
}
</script>

</body>
</html>
